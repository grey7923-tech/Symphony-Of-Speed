<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Symphony of Speed</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#050e1a;color:#c8dff0;min-height:100vh}
#app{max-width:480px;margin:0 auto;padding:20px}
.card{background:#071628;border:1px solid #0e2640;border-radius:16px;padding:16px;margin-bottom:12px}
.btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;color:#fff}
.blue{background:#2E75B6}
.ghost{background:#0d1f30;border:1px solid #1e3a55;color:#c8dff0}
.red{background:#C0392B}
.green{background:#1E8449}
input{width:100%;background:#0d1f30;border:1px solid #1e3a55;border-radius:10px;padding:12px;color:#c8dff0;font-size:16px;margin-bottom:12px;outline:none}
.lbl{color:#6b8fa8;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
h1{font-size:22px;font-weight:800;color:#2E75B6;margin-bottom:4px}
h2{font-size:18px;font-weight:700;margin-bottom:12px}
.sub{color:#3a5570;font-size:13px;margin-bottom:24px}
.ath-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #0e2640}
.tag{background:#0d1f30;border-radius:6px;padding:3px 8px;font-size:12px;color:#6b8fa8}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #1e3a55;border-top-color:#2E75B6;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px 20px"><div class="spin"></div><p style="margin-top:12px;color:#3a5570">Loading...</p></div></div>
<script>
const SURL='https://xbnixotnatkwycqmukwg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhibml4b3RuYXRrd3ljcW11a3dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDMxMTUsImV4cCI6MjA5Mjg3OTExNX0.a6qlQhjeo66RJb9kd0yH3FxXzyBXHhZMK9R_awecHg8';
const sb=supabase.createClient(SURL,SKEY);
let S={user:null,coach:null,teams:[],view:'loading'};

function R(){
  const a=document.getElementById('app');
  if(!a)return;
  try{a.innerHTML=render();}catch(e){a.innerHTML='<p style="padding:20px;color:red">Error: '+e.message+'</p>';}
}

function render(){
  if(S.view==='loading')return`<div style="text-align:center;padding:60px 20px"><div class="spin"></div><p style="margin-top:12px;color:#3a5570">Loading...</p></div>`;

  if(S.view==='login')return`
    <div style="padding:40px 0 20px;text-align:center">
      <h1>SYMPHONY OF SPEED</h1>
      <p class="sub">v21.0 · S&S Athletics</p>
    </div>
    <div class="card">
      <span class="lbl">Email</span>
      <input id="em" type="email" placeholder="coach@email.com"/>
      <span class="lbl">Password</span>
      <input id="pw" type="password" placeholder="••••••••"/>
      <button class="btn blue" onclick="signIn()">Sign In</button>
      <button class="btn ghost" onclick="S.view='signup';R()">Create Account</button>
    </div>`;

  if(S.view==='signup')return`
    <div style="padding:40px 0 20px;text-align:center">
      <h1>SYMPHONY OF SPEED</h1>
      <p class="sub">Create your account</p>
    </div>
    <div class="card">
      <span class="lbl">Name</span>
      <input id="nm" type="text" placeholder="Coach Randy"/>
      <span class="lbl">Organization</span>
      <input id="org" type="text" placeholder="S&S Athletics"/>
      <span class="lbl">Email</span>
      <input id="em" type="email" placeholder="coach@email.com"/>
      <span class="lbl">Password</span>
      <input id="pw" type="password" placeholder="••••••••"/>
      <button class="btn blue" onclick="signUp()">Create Account</button>
      <button class="btn ghost" onclick="S.view='login';R()">← Back to Sign In</button>
    </div>`;

  if(S.view==='home'){
    const teamsHtml=S.teams.map(t=>`
      <div class="card">
        <div class="topbar">
          <div>
            <div style="font-weight:700;font-size:16px">${t.name}</div>
            <div style="color:#3a5570;font-size:12px">${(t.athletes||[]).length} athletes</div>
          </div>
          <span style="width:12px;height:12px;border-radius:50%;background:${t.color||'#2E75B6'};display:inline-block"></span>
        </div>
        ${(t.athletes||[]).map(a=>`
          <div class="ath-row">
            <div>
              <div style="font-weight:600">${a.name}</div>
              <div style="color:#3a5570;font-size:12px">${a.sport} · Age ${a.age||'?'}</div>
            </div>
            <span class="tag">${a.phase_id||'foundation'}</span>
          </div>`).join('')}
      </div>`).join('');

    return`
      <div class="topbar card" style="margin-bottom:16px">
        <div>
          <div style="font-weight:800;color:#2E75B6">SYMPHONY OF SPEED</div>
          <div style="color:#3a5570;font-size:12px">${S.coach?.name||'Coach'} · ${S.coach?.org_name||''}</div>
        </div>
        <button class="btn red" style="width:auto;padding:8px 14px;margin:0" onclick="signOut()">Sign Out</button>
      </div>
      <h2>Your Teams</h2>
      ${teamsHtml||'<p style="color:#3a5570">No teams yet.</p>'}`;
  }
  return`<p style="padding:20px">Unknown view: ${S.view}</p>`;
}

async function signIn(){
  const e=document.getElementById('em')?.value?.trim();
  const p=document.getElementById('pw')?.value?.trim();
  if(!e||!p)return alert('Enter email and password');
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error)return alert('Sign in failed: '+error.message);
}

async function signUp(){
  const n=document.getElementById('nm')?.value?.trim();
  const o=document.getElementById('org')?.value?.trim();
  const e=document.getElementById('em')?.value?.trim();
  const p=document.getElementById('pw')?.value?.trim();
  if(!n||!o||!e||!p)return alert('Fill in all fields');
  const{data,error}=await sb.auth.signUp({email:e,password:p});
  if(error)return alert('Sign up failed: '+error.message);
  await sb.from('coaches').insert({user_id:data.user.id,name:n,org_name:o,org_color:'#2E75B6'});
  alert('Account created! Sign in now.');
  S.view='login';R();
}

async function signOut(){await sb.auth.signOut();}

async function loadAll(){
  if(!S.user)return;
  const{data:coach}=await sb.from('coaches').select('*').eq('user_id',S.user.id).single();
  if(!coach){S.view='login';R();return;}
  S.coach=coach;
  const{data:teams}=await sb.from('teams').select('*').eq('coach_id',coach.id);
  S.teams=await Promise.all((teams||[]).map(async t=>{
    const{data:athletes}=await sb.from('athletes').select('*').eq('team_id',t.id);
    return{...t,athletes:athletes||[]};
  }));
  S.view='home';R();
}

// Init
S.view='login';R();
sb.auth.getSession().then(({data:{session}})=>{
  if(session?.user){S.user=session.user;loadAll();}
}).catch(()=>{});
sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session?.user){S.user=session.user;await loadAll();}
  else if(event==='SIGNED_OUT'){S.user=null;S.coach=null;S.teams=[];S.view='login';R();}
});
</script>
</body>
</html>
