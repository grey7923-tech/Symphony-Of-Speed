.inp:focus{border-color:#2E75B6}
.lbl{color:#6b8fa8;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px}

.slbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b8fa8;margin-bottom:10px}

.mbar{width:40px;height:4px;background:#1e3a55;border-radius:2px;margin:0 auto 18px}
.tag{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;display:inline-block}
.tile{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;font-size:11px;font-weight:700;margin:2px;border:2px solid}
.ibtn{background:none;border:none;cursor:pointer;padding:4px;color:#3a5570;font-size:20px}
.dot{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:inline-block}
.dot.sel{border-color:#fff;transform:scale(1.15)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #1e3a55;border-top-color:#2E75B6;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

async function dbSaveAth(a){
  await sb.from('athletes').upsert({
    id:a.id,team_id:a.team_id||S.teamId,
    name:a.name,sport:a.sport,age:a.age,sex:a.sex,position:a.position,
    phase_id:a.phase_id,week_in_cycle:a.week_in_cycle,phase_week:a.phase_week,
    baseline_done:a.baseline_done,in_season:a.in_season||false,
    reactive_level:a.reactive_level||1,
    baselines:a.baselines||{},intake:a.intake||{done:false},pkg:a.pkg||{purchased:0,used:0},
  });
}

async function dbSaveSess(athId,e){
  await sb.from('sessions').insert({
    athlete_id:athId,date:e.date,phase:e.phase,week:e.week,phase_week:e.phase_week,
    state:e.state,score:e.score,block:e.block,sprint_reps:e.sprint_reps||0,
    reactive_level:e.reactive_level||1,vals:e.vals||{},
  });
}

function patchAth(obj){
  S.teams=S.teams.map(t=>t.id!==S.teamId?t:{...t,athletes:t.athletes.map(a=>a.id!==S.athId?a:{...a,...obj})});
}

async function logSession(){
  const a=ath();if(!a)return;
  const s2=sess();
  // Prevent double tap
  const btn=document.querySelector('.btn-blue');
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  const entry={date:new Date().toISOString(),phase:a.phase_id,week:a.week_in_cycle,phase_week:a.phase_week,state:readState(),score:total(),block:s2?.block||'',sprint_reps:S.sprints,reactive_level:a.reactive_level||1,vals:{...S.lv}};
  const nw=a.week_in_cycle>=4?1:a.week_in_cycle+1;
  patchAth({sessions:[...a.sessions,{...entry,id:uid(),created_at:entry.date}],week_in_cycle:nw,phase_week:a.phase_week+1});
  await dbSaveSess(a.id,entry);
  await dbSaveAth({...ath(),week_in_cycle:nw,phase_week:a.phase_week+1});
  if(S.coachNote.trim()){
    const obs={created_at:new Date().toISOString(),note:S.coachNote,phase:a.phase_id,week:a.week_in_cycle};
    await sb.from('coach_observations').insert({athlete_id:a.id,note:S.coachNote,phase:a.phase_id,week:a.week_in_cycle});
    patchAth({coachObs:[...a.coachObs,obs]});
  }
  S.sprints=0;S.coachNote='';S.step='done';R();
}

  if(!SR)return alert('Voice not supported. Try Chrome.');
  const r=new SR();r.continuous=false;r.interimResults=false;r.lang='en-US';
  r.onstart=()=>{S.listening=true;R();};
  r.onend=()=>{S.listening=false;R();};
  r.onresult=e=>{S.coachNote=(S.coachNote?S.coachNote+' ':'')+e.results[0][0].transcript;R();};
  r.onerror=()=>{S.listening=false;R();};r.start();
}

async function genAI(){
  const a=ath();if(!a)return;
  const p2=ph(a.phase_id);
  S.aiLoading=true;S.aiResult=null;R();
  try{
    const prompt=`You are the Symphony of Speed v21.0 AI coach. Generate a custom training session.\n\nATHLETE: ${a.name}, Age ${a.age||'?'}, ${a.sport}, ${p2?.label} Phase Week ${a.week_in_cycle}/4\nBASELINES: 10m ${(a.baselines||{}).sprint10m||'?'}s, Broad ${(a.baselines||{}).broadJump||'?'}cm, Chin-Ups ${(a.baselines||{}).chinUps||'?'}\nIN-SEASON: ${a.in_season?'Yes - reduce vol 30%, no fly runs':'No'}\nCONTEXT: ${S.aiPrompt}\n\nWrite a complete session with warm-up, numbered drills with sets/reps/rest, one key cue, and coach rationale. Be specific and practical.`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const d=await res.json();
    S.aiResult=d.content?.map(c=>c.text||'').join('')||'Could not generate.';
  }catch(e){S.aiResult='Error connecting to AI.';}
  S.aiLoading=false;R();
}

function shareText(title,text){
  if(navigator.share)navigator.share({title,text});
  else{const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);alert('Copied to clipboard!');}
}

  if(v2==='parent'&&a){const last=(a.sessions||[])[a.sessions.length-1];const sc2=last?ST[last.state]:null;return`<div class="page"><div class="topbar" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${cp?.org_color||'#2E75B6'}"></div><div style="font-weight:800;font-size:16px;color:${cp?.org_color||'#2E75B6'}">${cp?.org_name}</div></div><button class="ibtn" onclick="S.view='ath';R()">✕</button></div><div class="scroll"><div class="sec"><div style="background:${p.color}11;border:1px solid ${p.color}33;border-radius:20px;padding:20px;text-align:center;margin-bottom:14px"><div style="width:60px;height:60px;border-radius:50%;background:${p.color}33;border:2px solid ${p.color};display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:26px;font-weight:800;color:${p.color}">${a.name.charAt(0)}</div><div style="font-weight:800;font-size:22px">${a.name}</div><div style="color:#6b8fa8;font-size:13px;margin-top:2px">${a.sport}${a.age?` · Age ${a.age}`:''}</div><div style="color:${p.color};font-weight:700;font-size:13px;margin-top:6px">${p.label} Phase · Session ${a.phase_week}</div></div>${sc2?`<div style="background:${sc2.bg};border:2px solid ${sc2.c};border-radius:16px;padding:16px;text-align:center;margin-bottom:14px"><div style="font-size:28px">${sc2.e}</div><div style="color:${sc2.c};font-weight:800;font-size:20px;margin-top:6px">Last Session: ${sc2.l}</div><div style="color:#8899aa;font-size:13px;margin-top:4px">${last.block} · Score ${last.score}/6</div><div style="color:#3a5570;font-size:12px;margin-top:2px">${new Date(last.created_at).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</div></div>`:'<div class="card" style="text-align:center;color:#3a5570;padding:20px">No sessions yet.</div>'}<div class="g2" style="margin-bottom:14px">${[{l:'Sessions',v3:(a.sessions||[]).length,i:'📅'},{l:'Phase Week',v3:a.week_in_cycle+'/4',i:'📈'},{l:'Green Days',v3:(a.sessions||[]).filter(s=>s.state==='train').length,i:'🟢'},{l:'Baseline',v3:a.baseline_done?'Done':'Needed',i:'✅'}].map(({l,v3,i})=>`<div style="background:#071628;border-radius:14px;padding:13px;border:1px solid #0e2640;text-align:center"><div style="font-size:18px;margin-bottom:4px">${i}</div><div style="font-weight:800;font-size:18px">${v3}</div><div style="color:#3a5570;font-size:11px;margin-top:2px">${l}</div></div>`).join('')}</div>${(a.coachObs||[]).length>0?`<div class="card" style="border-color:#2E75B644"><div style="color:#2E75B6;font-weight:700;font-size:12px;margin-bottom:6px">📋 Latest Coach Note</div><div style="color:#c8dff0;font-size:13px;line-height:1.6">${(a.coachObs||[])[(a.coachObs||[]).length-1]?.note}</div></div>`:''}<div style="text-align:center;color:#3a5570;font-size:11px;margin-top:16px">Powered by Symphony of Speed v21.0 · ${cp?.org_name}</div></div></div></div>`;}

  if(v2==='coach'){const all2=S.teams.flatMap(t2=>(t2.athletes||[]));return`<div class="page"><div class="topbar" style="justify-content:center"><div style="text-align:center"><div style="color:#2E75B6;font-weight:800;font-size:18px">COACH DASHBOARD</div><div style="color:#3a5570;font-size:10px;letter-spacing:1px">${all2.length} ATHLETES · ☁️ CLOUD</div></div></div><div class="scroll"><div class="sec">${S.teams.length===0?'<div class="card" style="text-align:center;color:#3a5570;padding:30px">No teams yet. Go to Teams tab to create one.</div>':S.teams.map(t2=>{if(!(t2.athletes||[]).length)return'';return`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:10px;height:10px;border-radius:50%;background:${t2.color}"></div><div style="font-weight:800;font-size:16px;color:${t2.color}">${t2.name}</div></div>${(t2.athletes||[]).map(a2=>{const p2=ph(a2.phase_id);const last2=(a2.sessions||[])[(a2.sessions||[]).length-1];const sc2=last2?ST[last2.state]:null;return`<div class="card" style="margin-bottom:8px;cursor:pointer;border-left:3px solid ${t2.color}" onclick="openAth('${t2.id}','${a2.id}')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-weight:800;font-size:16px">${a2.name}</div><div style="color:#6b8fa8;font-size:12px">${a2.sport}${a2.age?' · Age '+a2.age:''}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div style="background:${p2.color}22;border:1px solid ${p2.color}55;border-radius:8px;padding:4px 10px"><div style="color:${p2.color};font-weight:700;font-size:11px">${p2.label} Wk ${a2.phase_week}</div></div>${sc2?`<div class="tag" style="background:${sc2.bg};color:${sc2.c}">${sc2.e} ${sc2.l} ${last2.score}/6</div>`:''}</div></div>${(a2.sessions||[]).length>0?`<div>${(a2.sessions||[]).slice(-7).map(s=>{const sc3=ST[s.state]||ST.flush;return`<span class="tile" style="width:24px;height:24px;font-size:10px;background:${sc3.bg};border-color:${sc3.c};color:${sc3.c}">${s.score}</span>`;}).join('')}</div>`:''}</div>`;}).join('')}</div>`;}).join('')}</div></div>${navbar('coach')}</div>`;}

  if(v2==='profile') return`<div class="page"><div class="topbar"><button class="ibtn" onclick="S.view='home';R()">←</button><div style="font-weight:800;font-size:18px">Coach Profile</div><div style="width:32px"></div></div><div class="scroll"><div class="sec"><div style="background:${cp?.org_color||'#2E75B6'}22;border:1px solid ${cp?.org_color||'#2E75B6'}44;border-radius:20px;padding:24px;text-align:center;margin-bottom:16px"><div style="font-size:48px;margin-bottom:10px">🏃</div><div style="color:${cp?.org_color||'#2E75B6'};font-weight:800;font-size:22px">${cp?.org_name||''}</div><div style="color:#3a5570;font-size:12px;margin-top:8px">Coach: ${cp?.name||''} · ☁️ Cloud sync active</div></div><div class="slbl">ACCOUNT</div><div class="card"><div style="color:#6b8fa8;font-size:13px;margin-bottom:12px">Signed in as ${S.user?.email||''}</div><button class="btn btn-red" style="width:auto;padding:10px 20px;font-size:14px" onclick="if(confirm('Sign out?'))doSignOut()">Sign Out</button></div></div></div></div>`;

  return`<div style="padding:40px;color:#3a5570">Loading...</div>`;
}

function renderModal(){
  const m=S.modal;
  if(!m)return'';
  
  let html='';
  if(m==='addTeam') html=`<div class="mbar"></div><div style="font-weight:800;font-size:20px;margin-bottom:16px">Create Team</div><div class="lbl">Team Name *</div><input class="inp" id="nt_name" placeholder="e.g. Eagles" style="margin-bottom:16px" autofocus/><div class="lbl" style="margin-bottom:10px">Color</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">${COLORS.map(c=>`<div class="dot ${S.newTeamColor===c?'sel':''}" onclick="S.newTeamColor='${c}';refreshModal()" style="background:${c}"></div>`).join('')}</div><button class="btn btn-blue" style="margin-bottom:10px" onclick="createTeam()">Create Team</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button>`;
  
  if(m==='addAth') html=`<div class="mbar"></div><div style="font-weight:800;font-size:20px;margin-bottom:16px">Add Athlete</div><div class="lbl">Full Name *</div><input class="inp" id="na_name" placeholder="e.g. Jordan Smith" style="margin-bottom:10px" autofocus/><div class="g2" style="margin-bottom:10px"><div><div class="lbl">Age</div><input class="inp" id="na_age" type="number" placeholder="14"/></div><div><div class="lbl">Position</div><input class="inp" id="na_pos" placeholder="Guard"/></div></div><div class="lbl" style="margin-bottom:8px">Sex</div><div class="g2" style="margin-bottom:10px">${['male','female'].map(s=>`<button onclick="S.newAthSex='${s}';refreshModal()" style="background:${S.newAthSex===s?'#2E75B6':'#0d1f30'};color:${S.newAthSex===s?'#fff':'#6b8fa8'};border:1px solid ${S.newAthSex===s?'#2E75B6':'#1e3a55'};border-radius:10px;padding:10px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit">${s==='male'?'👦 Male':'👧 Female'}</button>`).join('')}</div><div class="lbl" style="margin-bottom:8px">Sport</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">${SPORTS.map(s=>`<button onclick="S.newAthSport='${s}';refreshModal()" style="background:${S.newAthSport===s?'#2E75B6':'#0d1f30'};color:${S.newAthSport===s?'#fff':'#6b8fa8'};border:1px solid ${S.newAthSport===s?'#2E75B6':'#1e3a55'};border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-family:inherit">${s}</button>`).join('')}</div><button class="btn btn-blue" style="margin-bottom:10px" onclick="createAth()">Add Athlete</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button>`;

  if(m==='injury') html=`<div class="mbar"></div><div style="font-weight:800;font-size:20px;margin-bottom:4px;color:#C0392B">🚨 Report Injury</div><div style="color:#8899aa;font-size:13px;margin-bottom:16px">Log this now.</div><div class="lbl">Body Part *</div><input class="inp" id="inj_body" placeholder="e.g. Left hamstring" style="margin-bottom:14px"/><div class="lbl">Pain Level</div><input type="range" id="inj_pain" min="1" max="10" value="5" style="width:100%;margin-bottom:6px;accent-color:#C0392B"/><div style="display:flex;justify-content:space-between;color:#3a5570;font-size:11px;margin-bottom:14px"><span>1 Mild</span><span>5 Moderate</span><span>10 Severe</span></div><div class="lbl">Description</div><textarea class="inp" id="inj_notes" placeholder="When did it start?" style="min-height:70px;resize:vertical;font-size:14px;font-weight:400;margin-bottom:14px"></textarea><button class="btn btn-red" style="margin-bottom:10px" onclick="logInjury()">Log Injury</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button>`;

  if(!html) return '';

  // Use a separate modal container outside #app
  setTimeout(()=>{
    let mc=document.getElementById('modalContainer');
    if(!mc){mc=document.createElement('div');mc.id='modalContainer';mc.style.cssText='position:fixed;inset:0;background:#000c;z-index:1000;display:flex;align-items:flex-end;justify-content:center';document.body.appendChild(mc);}
    mc.onclick=(e)=>{if(e.target===mc)closeModal();};
    mc.innerHTML=`<div style="background:#071628;border-radius:20px 20px 0 0;border-top:1px solid #0e2640;width:100%;max-width:480px;padding:20px 16px 40px;max-height:88vh;overflow-y:auto;font-family:'DM Sans',sans-serif;color:#c8dff0">${html}</div>`;
    mc.style.display='flex';
  },10);
  return '';
}

function refreshModal(){
  const m=S.modal;
  closeModal(true);
  S.modal=m;
  renderModal();
}

function closeModal(silent){
  S.modal=null;
  const mc=document.getElementById('modalContainer');
  if(mc)mc.remove();
  if(!silent)R();
}

// ── NAV BAR ───────────────────────────────────────────────────────────────────
function navbar(active){
  return`<div class="navbar">${[{id:'home',icon:'🏠',l:'Teams'},{id:'coach',icon:'👁',l:'Coach'},{id:'profile',icon:'👤',l:'Profile'}].map(({id,icon,l})=>`<button class="nbtn" onclick="S.view='${id}';R()"><div style="font-size:20px">${icon}</div><div style="font-size:9px;font-weight:700;color:${active===id?'#2E75B6':'#3a5570'}">${l}</div>${active===id?'<div style="width:16px;height:2px;background:#2E75B6;border-radius:2px"></div>':''}</button>`).join('')}</div>`;
}

// ── EXTRA HANDLERS ────────────────────────────────────────────────────────────
function openAth(tid,aid){
  S.teamId=tid;S.athId=aid;
  const a2=S.teams.find(t=>t.id===tid)?.athletes?.find(a=>a.id===aid);
  if(a2){S.bv={...(a2.baselines||{})};}
  S.sc={sleep:null,legs:null,knees:null};
  S.lv={sprint10m:'',broadJump:'',vertJump:'',chinUps:'',bodyweight:'',reactAgility:'',notes:''};
  S.sprints=0;S.coachNote='';S.step='ready';S.view='ath';R();
}

function startSess(){
  S.sc={sleep:null,legs:null,knees:null};
  S.lv={sprint10m:'',broadJump:'',vertJump:'',chinUps:'',bodyweight:'',reactAgility:'',notes:''};
  S.sprints=0;S.coachNote='';S.step='ready';S.view='session';R();
}

function shareReport(){
  const a2=ath();if(!a2)return;
  const text=`${S.coach?.org_name} — Report\n${a2.name} · ${a2.sport}${a2.age?' · Age '+a2.age:''}\n${new Date().toLocaleDateString()}\n\nPhase: ${ph(a2.phase_id)?.label} · Session ${a2.phase_week}\nSessions: ${(a2.sessions||[]).length}`;
  shareText(a2.name+' Report',text);
}

async function genAINarr(){
  const a2=ath();if(!a2)return;
  if((a2.sessions||[]).length<2)return alert('Need at least 2 sessions logged.');
  const p2=ph(a2.phase_id);
  const gp=Math.round((a2.sessions||[]).filter(s=>s.state==='train').length/(a2.sessions||[]).length*100);
  S.aiLoading=true;S.aiResult=null;R();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:`Write a 3-paragraph progress report for a parent. Warm, clear, jargon-free.\n\nCOACH: ${S.coach?.name} at ${S.coach?.org_name}\nATHLETE: ${a2.name}, Age ${a2.age||'?'}, ${a2.sport}\nPHASE: ${p2?.label}, Session ${a2.phase_week}\nSESSIONS: ${(a2.sessions||[]).length} total, ${gp}% green days\n\nParagraph 1: Overall progress, what we've been working on.\nParagraph 2: What's improving, what's challenging, next focus.\nParagraph 3: What parents can support at home.\n\nEnd with one coach recommendation. No bullet points. Use athlete's first name.`}]})});
    const d=await res.json();
    S.aiResult=d.content?.map(c=>c.text||'').join('')||'Could not generate.';
  }catch(e){S.aiResult='Error connecting to AI.';}
  S.aiLoading=false;R();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Show login immediately — don't wait for Supabase
S.view='login';R();

// Then check for existing session in background
sb.auth.getSession().then(({data:{session}})=>{
  if(session?.user){S.user=session.user;loadAll();}
}).catch(()=>{});

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session?.user){S.user=session.user;await loadAll();}
  else if(event==='SIGNED_OUT'){S.user=null;S.coach=null;S.teams=[];S.view='login';R();}
});
</script>
</body>
